<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Card Benefits Tracker</title>
<style>
:root{color-scheme:light;--bg:#EEF2F7;--surface:#FFF;--s2:#F8FAFC;--border:#E2E8F0;--t1:#1E293B;--t2:#475569;--t3:#94A3B8;--blue:#2563EB;--blt:#EFF6FF;--green:#059669;--glt:#ECFDF5;--rad:12px;--rsm:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);font-size:13px;min-height:100vh}
/* Top nav */
.topnav{background:#1E293B;padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.topnav-title{color:#fff;font-size:14px;font-weight:700}
.topnav-link{color:#94A3B8;font-size:12px;text-decoration:none;padding:5px 10px;border-radius:6px;transition:all .15s}
.topnav-link:hover{background:#334155;color:#fff}
/* Header */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.hdr-title{font-size:15px;font-weight:700}.hdr-sub{font-size:11px;color:var(--t3);margin-top:1px}
.ptabs{display:flex;gap:3px}
.ptab{padding:5px 10px;border-radius:20px;border:none;background:none;color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.ptab:hover{background:var(--bg)}.ptab.active{background:var(--blue);color:#fff}
/* Layout */
.layout{display:flex;height:calc(100vh - 91px)}
.sbar{width:185px;min-width:185px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding-bottom:16px}
.sbar-sec{padding:10px 10px 4px}
.sbar-lbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.nav-it{padding:6px 9px;border-radius:var(--rsm);cursor:pointer;font-size:12px;font-weight:500;color:var(--t2);transition:all .15s;border:1.5px solid transparent;margin-bottom:1px}
.nav-it:hover{background:var(--bg)}.nav-it.active{background:var(--blt);color:var(--blue);border-color:#BFDBFE}
.nav-it.cov-nav{color:#7C3AED}.nav-it.cov-nav:hover{background:#F5F3FF}.nav-it.cov-nav.active{background:#F5F3FF;color:#6D28D9;border-color:#C4B5FD}
.cit{border-radius:var(--rsm);padding:8px 9px;cursor:pointer;margin-bottom:3px;border:1.5px solid transparent;transition:all .15s}
.cit:hover{background:var(--bg)}.cit.active{border-color:var(--blue);background:var(--blt)}
.cit-name{font-weight:600;font-size:12px;display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cit-fee{font-size:10px;color:var(--t3);margin-top:1px}
.cpb{height:3px;border-radius:2px;background:var(--border);margin-top:5px;overflow:hidden}
.cpf{height:100%;border-radius:2px;background:var(--green);transition:width .3s}
.cps{display:flex;justify-content:space-between;margin-top:2px;font-size:10px}
/* Main */
.main{flex:1;overflow-y:auto;padding:14px}
.srow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 12px}
.sc-l{font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.sc-v{font-size:19px;font-weight:800;color:var(--t1);margin-top:1px;line-height:1.1}
.sc-s{font-size:10px;color:var(--t3);margin-top:2px}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:9px;margin-bottom:12px}
.oc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);overflow:hidden;cursor:pointer;transition:all .18s}
.oc:hover{box-shadow:0 4px 14px rgba(0,0,0,.09);transform:translateY(-1px)}
.oc-hdr{padding:11px 14px;color:#fff}.oc-name{font-size:13px;font-weight:700}.oc-fee{font-size:10px;opacity:.75;margin-top:1px}
.oc-body{padding:9px 14px}
.opb{height:4px;border-radius:3px;background:var(--border);margin:6px 0;overflow:hidden}
.opf{height:100%;border-radius:3px;background:var(--green);transition:width .4s}
.osts{display:flex;justify-content:space-between}
.os{text-align:center}.os-v{font-size:13px;font-weight:700}.os-l{font-size:10px;color:var(--t3)}
.cdh{border-radius:var(--rad);padding:13px 15px;margin-bottom:11px;color:#fff}
.cdh-name{font-size:15px;font-weight:700}.cdh-fee{font-size:11px;opacity:.75;margin-top:1px}
.cdh-sts{display:flex;gap:18px;margin-top:9px;flex-wrap:wrap}
.cdhs-v{font-size:16px;font-weight:700;line-height:1}.cdhs-l{font-size:10px;opacity:.7;margin-top:2px}
.sec{margin-bottom:11px}
.sec-t{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sec-v{font-size:12px;font-weight:600;color:var(--t2)}
.br{background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);padding:8px 10px;margin-bottom:4px;display:flex;align-items:center;gap:8px;transition:all .15s;cursor:pointer;user-select:none}
.br:hover{box-shadow:0 4px 14px rgba(0,0,0,.09);border-color:#CBD5E1}
.br.used{background:var(--glt);border-color:#A7F3D0}
.br.used .bn{color:var(--t2);text-decoration:line-through;text-decoration-color:#6EE7B7}
.bck{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:#fff;font-size:10px;font-weight:700;color:#fff}
.bck.on{background:var(--green);border-color:var(--green)}
.bi{font-size:14px;flex-shrink:0}
.binfo{flex:1;min-width:0}
.bn{font-size:12px;font-weight:600;color:var(--t1)}
.bd{font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.bnp{font-size:11px;color:var(--blue);margin-top:1px}
.brt{display:flex;align-items:center;gap:6px;flex-shrink:0}
.bv{font-size:12px;font-weight:700;color:var(--t1)}.bv.z{color:var(--t3);font-size:11px}
.pb{font-size:10px;font-weight:600;padding:2px 6px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.pb.monthly{background:#DBEAFE;color:#1D4ED8}.pb.quarterly{background:#FEF3C7;color:#B45309}
.pb.semi-annual{background:#FCE7F3;color:#BE185D}.pb.annual{background:#EDE9FE;color:#6D28D9}
.nb{background:none;border:none;cursor:pointer;color:var(--t3);padding:2px 3px;font-size:12px;border-radius:4px;transition:all .15s;line-height:1}
.nb:hover{color:var(--blue);background:var(--blt)}
.nbox{padding:6px 10px 6px 36px;background:var(--s2);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--rsm) var(--rsm);margin-bottom:4px;margin-top:-4px}
.ni{width:100%;border:1px solid var(--border);border-radius:5px;padding:5px 8px;font-size:12px;color:var(--t1);background:#fff;resize:none;font-family:inherit;outline:none;line-height:1.5}
.ni:focus{border-color:var(--blue)}
/* Coverage Hub */
.cov-qr{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.qr-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);padding:11px 12px;cursor:pointer;transition:all .15s}
.qr-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.09);border-color:#CBD5E1}
.qr-icon{font-size:20px;margin-bottom:5px}.qr-label{font-size:11px;font-weight:700;color:var(--t1)}
.qr-rec{font-size:11px;color:var(--green);font-weight:600;margin-top:2px}
.sc-tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.sc-tab{padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.sc-tab:hover{background:var(--bg)}.sc-tab.active{background:#EDE9FE;color:#6D28D9;border-color:#C4B5FD}
.cov-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:16px}
.cov-tip{background:#FFF7ED;border:1px solid #FED7AA;border-radius:var(--rsm);padding:10px 13px;font-size:12px;color:#92400E;margin-bottom:12px;line-height:1.6}
.cov-items{display:flex;flex-direction:column;gap:6px}
.cov-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--s2)}
.cov-item-name{font-size:13px;font-weight:600;color:var(--t1)}
.cov-item-detail{font-size:11px;color:var(--t2);margin-top:2px;line-height:1.5}
.tier-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.tier-badge.primary,.tier-badge.best{background:#D1FAE5;color:#065F46}
.tier-badge.good{background:#DBEAFE;color:#1E40AF}
.tier-badge.secondary{background:#F1F5F9;color:#64748B}
.tier-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);margin:10px 0 5px;padding-bottom:4px;border-bottom:1px solid var(--border)}
/* Claims */
.claims-section{margin-top:16px}
.claims-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.claims-hdr h3{font-size:13px;font-weight:700}
.claims-empty{text-align:center;padding:24px;color:var(--t3);border:1.5px dashed var(--border);border-radius:var(--rsm);font-size:12px}
.claim-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);margin-bottom:4px;font-size:12px;flex-wrap:wrap}
.claim-date{color:var(--t3);font-size:11px;white-space:nowrap}
.claim-card{font-weight:600}.claim-ben{color:var(--t2);flex:1}
.claim-amt{font-weight:700}
.claim-status{font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px}
.claim-status.pending{background:#FEF3C7;color:#B45309}
.claim-status.approved{background:#D1FAE5;color:#065F46}
.claim-status.denied{background:#FEE2E2;color:#991B1B}
.claim-del{background:none;border:none;cursor:pointer;color:var(--t3);font-size:13px;padding:2px 4px;border-radius:4px}
.claim-del:hover{color:#DC2626;background:#FEE2E2}
.add-claim-form{background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);padding:12px;margin-bottom:8px;display:none}
.add-claim-form.open{display:block}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.form-row.tri{grid-template-columns:1fr 1fr 1fr}
.fi{width:100%;border:1px solid var(--border);border-radius:5px;padding:6px 9px;font-size:12px;color:var(--t1);background:#fff;font-family:inherit;outline:none}
.fi:focus{border-color:var(--blue)}
.form-label{font-size:10px;font-weight:600;color:var(--t3);margin-bottom:3px;display:block;text-transform:uppercase;letter-spacing:.4px}
/* Util */
.btn{padding:5px 12px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-p{background:var(--blue);color:#fff}.btn-p:hover{background:#1D4ED8}
.btn-s{background:var(--bg);color:var(--t2);border:1px solid var(--border)}.btn-s:hover{background:var(--border)}
.btn-v{background:#EDE9FE;color:#6D28D9;border:none}.btn-v:hover{background:#DDD6FE}
.btn-sm{padding:4px 9px;font-size:11px}
.green{color:var(--green)}.muted{color:var(--t3)}
.empty{text-align:center;padding:36px 20px;color:var(--t3)}.ei{font-size:28px;margin-bottom:8px}
/* Save indicator */
.save-indicator{position:fixed;bottom:16px;right:16px;background:#059669;color:#fff;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100}
.save-indicator.show{opacity:1}
@media(max-width:560px){.sbar{width:145px;min-width:145px}.srow{grid-template-columns:repeat(2,1fr)}.cgrid{grid-template-columns:1fr}.cov-qr{grid-template-columns:repeat(2,1fr)}.form-row,.form-row.tri{grid-template-columns:1fr}}
</style>
</head>

// ── LOCALSTORAGE ─────────────────────────────────────────────────
function saveState(){
  try{
    const data={benefits:{},claims};
    cards.forEach(c=>{
      c.benefits.forEach(b=>{
        if(b.used||b.notes) data.benefits[b.id]={used:b.used,notes:b.notes};
      });
    });
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
    showToast();
  }catch(e){console.warn('Save failed:',e)}
}

function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return;
    const data=JSON.parse(raw);
    if(data.benefits){
      cards.forEach(c=>c.benefits.forEach(b=>{
        if(data.benefits[b.id]){b.used=data.benefits[b.id].used||false;b.notes=data.benefits[b.id].notes||'';}
      }));
    }
    if(data.claims)claims=data.claims;
  }catch(e){console.warn('Load failed:',e)}
}

let toastTimer;
function showToast(){
  const t=document.getElementById('save-toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1500);
}

// ── HELPERS ──────────────────────────────────────────────────────
function card(id){return cards.find(c=>c.id===id)}
function fmtM(v){return v===0?'—':'$'+(v%1===0?v.toFixed(0):v.toFixed(2))}
function pct(u,t){return t>0?Math.round(u/t*100):0}
function sumV(bs){return bs.reduce((s,b)=>s+b.v,0)}
function usedV(bs){return bs.filter(b=>b.used).reduce((s,b)=>s+b.v,0)}
function annualV(c){return c.benefits.reduce((s,b)=>{
  if(b.p==='monthly')return s+b.v*12;if(b.p==='quarterly')return s+b.v*4;
  if(b.p==='semi-annual')return s+b.v*2;return s+b.v;
},0)}
function filtered(c){return S.period==='all'?c.benefits:c.benefits.filter(b=>b.p===S.period)}
function grad(c){return`linear-gradient(135deg,${c.c1} 0%,${c.c2} 100%)`}
function badge(p){return`<span class="pb ${PC[p]||'annual'}">${PL[p]||p}</span>`}
function byIssuer(){const m={};cards.forEach(c=>{if(!m[c.issuer])m[c.issuer]=[];m[c.issuer].push(c)});return ISSUERS.filter(i=>m[i]).map(i=>({issuer:i,cards:m[i]}))}

// ── ACTIONS ──────────────────────────────────────────────────────
function toggleB(cid,bid){
  const b=card(cid)?.benefits.find(b=>b.id===bid);
  if(b){b.used=!b.used;saveState();render()}
}
function toggleNote(bid){S.openNotes.has(bid)?S.openNotes.delete(bid):S.openNotes.add(bid);render()}
function setNote(cid,bid,v){
  const b=card(cid)?.benefits.find(b=>b.id===bid);
  if(b){b.notes=v;saveState();}
}
function setPeriod(p){
  S.period=p;
  document.querySelectorAll('.ptab').forEach((t,i)=>{t.classList.toggle('active',['all','monthly','quarterly','annual'][i]===p)});
  renderMain();
}
function setView(v,cid){S.view=v;S.cardId=cid||null;render()}
function setCovScenario(id){S.covScenario=id;renderMain()}
function toggleClaimForm(){S.showClaimForm=!S.showClaimForm;renderMain()}
function addClaim(){
  const d=document.getElementById('cl-date').value;
  const cid=document.getElementById('cl-card').value;
  const ben=document.getElementById('cl-benefit').value;
  const amt=document.getElementById('cl-amt').value;
  const sta=document.getElementById('cl-status').value;
  const note=document.getElementById('cl-note').value;
  if(!ben.trim())return;
  const id=Date.now();
  claims.push({id,date:d||new Date().toISOString().slice(0,10),cardId:cid,benefit:ben,amount:amt,status:sta,note});
  S.showClaimForm=false;saveState();renderMain();
}
function deleteClaim(id){claims=claims.filter(c=>c.id!==id);saveState();renderMain()}
function updateClaimStatus(id,st){const c=claims.find(c=>c.id===id);if(c){c.status=st;saveState();renderMain()}}

// ── SIDEBAR ──────────────────────────────────────────────────────
function renderSidebar(){
  document.getElementById('nav-ov').className='nav-it'+(S.view==='overview'?' active':'');
  document.getElementById('nav-cov').className='nav-it cov-nav'+(S.view==='coverage'?' active':'');
  let html='';
  byIssuer().forEach(({issuer,cards:grp})=>{
    html+=`<div class="sbar-sec"><div class="sbar-lbl">${issuer}</div>`;
    grp.forEach(c=>{
      const f=filtered(c),tv=sumV(f),uv=usedV(f),pp=pct(uv,tv);
      const act=S.view==='card'&&S.cardId===c.id;
      html+=`<div class="cit${act?' active':''}" onclick="setView('card','${c.id}')">
        <div class="cit-name"><span class="dot" style="background:${c.c1}"></span>${c.short}</div>
        <div class="cit-fee">${c.fee>0?'$'+c.fee+'/yr':'No fee'}</div>
        <div class="cpb"><div class="cpf" style="width:${pp}%"></div></div>
        <div class="cps"><span class="green" style="font-weight:600">${fmtM(uv)}</span><span class="muted">${pp}%</span></div>
      </div>`;
    });
    html+='</div>';
  });
  document.getElementById('sbar-cards').innerHTML=html;
}

// ── BENEFIT ROW ──────────────────────────────────────────────────
function bRow(cid,b,showCard,cshort){
  const noteOpen=S.openNotes.has(b.id);
  const tag=showCard?` <span style="font-weight:400;color:var(--t3);font-size:10px">· ${cshort}</span>`:'';
  return`<div>
    <div class="br${b.used?' used':''}" onclick="toggleB('${cid}','${b.id}')">
      <div class="bck${b.used?' on':''}">${b.used?'✓':''}</div>
      <div class="bi">${ICONS[b.cat]||'⭐'}</div>
      <div class="binfo">
        <div class="bn">${b.name}${tag}</div>
        <div class="bd">${b.desc}</div>
        ${b.notes?`<div class="bnp">📝 ${b.notes}</div>`:''}
      </div>
      <div class="brt">
        ${badge(b.p)}
        <div class="bv${b.v===0?' z':''}">${b.v>0?'$'+b.v:'Incl.'}</div>
        <button class="nb" onclick="event.stopPropagation();toggleNote('${b.id}')" title="Note">📝</button>
      </div>
    </div>
    ${noteOpen?`<div class="nbox"><textarea class="ni" rows="2" placeholder="Note (e.g. used at JFK Centurion Apr 5)…" onchange="setNote('${cid}','${b.id}',this.value)">${b.notes||''}</textarea></div>`:''}
  </div>`;
}

function section(title,bs,cid,showCard,cardMap){
  const tv=sumV(bs),uv=usedV(bs);
  const vs=tv>0?`$${uv.toFixed(0)} / $${tv.toFixed(0)} used`:`${bs.length} benefit${bs.length!==1?'s':''}`;
  return`<div class="sec"><div class="sec-t"><span>${title}</span><span class="sec-v">${vs}</span></div>${bs.map(b=>bRow(cid||b._cid,b,showCard,cardMap?cardMap[b._cid]:'')).join('')}</div>`;
}

// ── OVERVIEW ─────────────────────────────────────────────────────
function renderOverview(){
  const allB=cards.flatMap(c=>c.benefits);
  const fB=S.period==='all'?allB:allB.filter(b=>b.p===S.period);
  const tv=sumV(fB),uv=usedV(fB);
  const totalFee=cards.reduce((s,c)=>s+c.fee,0);
  const usedCt=allB.filter(b=>b.used).length;
  const totalAnnV=cards.reduce((s,c)=>s+annualV(c),0);
  const grid=cards.map(c=>{
    const f=filtered(c),cv=sumV(f),cu=usedV(f),p=pct(cu,cv),av=annualV(c);
    return`<div class="oc" onclick="setView('card','${c.id}')">
      <div class="oc-hdr" style="background:${grad(c)}"><div class="oc-name">${c.name}</div><div class="oc-fee">${c.fee>0?'$'+c.fee+'/yr · ':'No fee · '}${c.issuer}</div></div>
      <div class="oc-body"><div class="opb"><div class="opf" style="width:${p}%"></div></div>
      <div class="osts">
        <div class="os"><div class="os-v">$${av.toLocaleString()}</div><div class="os-l">annual value</div></div>
        <div class="os"><div class="os-v green">$${cu.toFixed(0)}</div><div class="os-l">used</div></div>
        <div class="os"><div class="os-v">${p}%</div><div class="os-l">captured</div></div>
        <div class="os"><div class="os-v">${f.length}</div><div class="os-l">benefits</div></div>
      </div></div></div>`;
  }).join('');
  const periods=S.period==='all'?['monthly','semi-annual','quarterly','annual']:[S.period];
  const cardMap=Object.fromEntries(cards.map(c=>[c.id,c.short]));
  let lists='';
  periods.forEach(per=>{
    const bs=cards.flatMap(c=>c.benefits.filter(b=>b.p===per).map(b=>({...b,_cid:c.id})));
    if(!bs.length)return;
    lists+=section(PL[per]||per,bs,null,true,cardMap);
  });
  return`<div class="srow">
    <div class="sc"><div class="sc-l">Annual Fees</div><div class="sc-v">$${totalFee.toLocaleString()}</div><div class="sc-s">${cards.length} cards</div></div>
    <div class="sc"><div class="sc-l">Est. Annual Value</div><div class="sc-v">$${totalAnnV.toLocaleString()}</div><div class="sc-s">monetary benefits</div></div>
    <div class="sc"><div class="sc-l">Used${S.period!=='all'?' ('+PL[S.period]+')':''}</div><div class="sc-v green">$${uv.toFixed(0)}</div><div class="sc-s">${pct(uv,tv)}% captured</div></div>
    <div class="sc"><div class="sc-l">Benefits Used</div><div class="sc-v">${usedCt}/${allB.length}</div><div class="sc-s">across all cards</div></div>
  </div><div class="cgrid">${grid}</div>${lists}`;
}

// ── CARD DETAIL ───────────────────────────────────────────────────
function renderCard(cid){
  const c=card(cid);if(!c)return'<div class="empty">Card not found</div>';
  const f=filtered(c),tv=sumV(f),uv=usedV(f),av=annualV(c);
  const usedCt=c.benefits.filter(b=>b.used).length;
  const periods=S.period==='all'?['monthly','semi-annual','quarterly','annual']:[S.period];
  let lists='';
  periods.forEach(per=>{const bs=c.benefits.filter(b=>b.p===per);if(!bs.length)return;lists+=section(PL[per]||per,bs,cid,false,null)});
  return`<div class="cdh" style="background:${grad(c)}">
    <div class="cdh-name">${c.name}</div>
    <div class="cdh-fee">${c.fee>0?'$'+c.fee+'/yr annual fee':'No annual fee'} · ${c.issuer}</div>
    <div class="cdh-sts">
      <div><div class="cdhs-v">$${av.toLocaleString()}</div><div class="cdhs-l">Est. annual value</div></div>
      <div><div class="cdhs-v">$${uv.toFixed(0)}</div><div class="cdhs-l">Used${S.period!=='all'?' (filtered)':''}</div></div>
      <div><div class="cdhs-v">${pct(uv,tv)}%</div><div class="cdhs-l">Captured</div></div>
      <div><div class="cdhs-v">${usedCt}/${c.benefits.length}</div><div class="cdhs-l">Benefits used</div></div>
    </div>
  </div>${lists||`<div class="empty"><div class="ei">🎉</div><div>No benefits for this filter</div></div>`}`;
}

// ── COVERAGE HUB ─────────────────────────────────────────────────
function renderCoverage(){
  const sc=SCENARIOS.find(s=>s.id===S.covScenario)||SCENARIOS[0];
  const qr=SCENARIOS.map(s=>`<div class="qr-card" onclick="setCovScenario('${s.id}')">
    <div class="qr-icon">${s.icon}</div><div class="qr-label">${s.title}</div>
    <div class="qr-rec">→ ${s.qrRec}</div></div>`).join('');
  const tabs=SCENARIOS.map(s=>`<button class="sc-tab${s.id===S.covScenario?' active':''}" onclick="setCovScenario('${s.id}')">${s.icon} ${s.title}</button>`).join('');
  let itemsHtml='';
  sc.sections.forEach(sec=>{
    itemsHtml+=`<div class="tier-section-label">${sec.label}</div>`;
    sec.items.forEach(item=>{
      const c=card(item.cid);if(!c)return;
      itemsHtml+=`<div class="cov-item">
        <span class="dot" style="background:${c.c1};margin-top:4px;width:10px;height:10px;flex-shrink:0"></span>
        <div style="flex:1;min-width:0">
          <div class="cov-item-name">${c.name} <span style="font-size:10px;color:var(--t3);font-weight:400">· ${c.fee>0?'$'+c.fee+'/yr':'No fee'}</span></div>
          <div class="cov-item-detail">${item.detail}</div>
        </div>
        <span class="tier-badge ${sec.tier}">${sec.tier==='best'?'Best':sec.tier==='primary'?'Primary':sec.tier==='good'?'Good':'Secondary'}</span>
      </div>`;
    });
  });
  const cardOpts=cards.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  const claimRows=claims.length===0
    ?`<div class="claims-empty">No claims logged yet.</div>`
    :claims.map(cl=>{
      const c=card(cl.cardId);
      return`<div class="claim-row">
        <span class="claim-date">${cl.date}</span>
        <span class="claim-card" style="color:${c?.c1||'#333'}">${c?.short||cl.cardId}</span>
        <span class="claim-ben">${cl.benefit}${cl.note?` — ${cl.note}`:''}</span>
        ${cl.amount?`<span class="claim-amt">$${cl.amount}</span>`:''}
        <select class="claim-status ${cl.status}" onchange="updateClaimStatus(${cl.id},this.value)" style="border:none;background:none;font-size:10px;font-weight:700;cursor:pointer">
          <option value="pending" ${cl.status==='pending'?'selected':''}>Pending</option>
          <option value="approved" ${cl.status==='approved'?'selected':''}>Approved</option>
          <option value="denied" ${cl.status==='denied'?'selected':''}>Denied</option>
        </select>
        <button class="claim-del" onclick="deleteClaim(${cl.id})">✕</button>
      </div>`;
    }).join('');
  const claimForm=`<div class="add-claim-form${S.showClaimForm?' open':''}">
    <div class="form-row tri">
      <div><label class="form-label">Date</label><input class="fi" type="date" id="cl-date" value="${new Date().toISOString().slice(0,10)}"></div>
      <div><label class="form-label">Card</label><select class="fi" id="cl-card">${cardOpts}</select></div>
      <div><label class="form-label">Status</label><select class="fi" id="cl-status"><option value="pending">Pending</option><option value="approved">Approved</option><option value="denied">Denied</option></select></div>
    </div>
    <div class="form-row">
      <div><label class="form-label">Benefit / Coverage</label><input class="fi" type="text" id="cl-benefit" placeholder="e.g. Trip Cancellation — Delta flight"></div>
      <div><label class="form-label">Amount ($)</label><input class="fi" type="number" id="cl-amt" placeholder="450"></div>
    </div>
    <div style="margin-bottom:8px"><label class="form-label">Notes</label><input class="fi" type="text" id="cl-note" placeholder="e.g. Filed online Apr 10, awaiting review"></div>
    <div style="display:flex;gap:6px">
      <button class="btn btn-p btn-sm" onclick="addClaim()">Save Claim</button>
      <button class="btn btn-s btn-sm" onclick="toggleClaimForm()">Cancel</button>
    </div>
  </div>`;
  return`<div>
    <div style="margin-bottom:12px">
      <div style="font-size:16px;font-weight:800;color:var(--t1);margin-bottom:2px">🛡️ Coverage Hub</div>
      <div style="font-size:12px;color:var(--t3)">Scenario-based guide — which card to use and when</div>
    </div>
    <div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px">Quick Reference</div>
    <div class="cov-qr">${qr}</div>
    <div class="sc-tabs">${tabs}</div>
    <div class="cov-panel"><div class="cov-tip">${sc.tip}</div><div class="cov-items">${itemsHtml}</div></div>
    <div class="claims-section">
      <div class="claims-hdr"><h3>📋 Claims & Coverage Log</h3>
        <button class="btn btn-v btn-sm" onclick="toggleClaimForm()">${S.showClaimForm?'✕ Cancel':'+ Log a Claim'}</button>
      </div>
      ${claimForm}${claimRows}
    </div>
  </div>`;
}

// ── MAIN RENDER ───────────────────────────────────────────────────
function renderMain(){
  const m=document.getElementById('main');
  document.getElementById('period-tabs').style.display=S.view==='coverage'?'none':'flex';
  if(S.view==='overview')m.innerHTML=renderOverview();
  else if(S.view==='card')m.innerHTML=renderCard(S.cardId);
  else if(S.view==='coverage')m.innerHTML=renderCoverage();
}
function render(){renderSidebar();renderMain()}

// ── RESET ─────────────────────────────────────────────────────────
function resetPeriod(){
  const opts=['monthly','quarterly','semi-annual','annual','all'];
  const labels=['Monthly credits','Quarterly credits','Semi-annual credits','Annual credits','ALL benefits'];
  const choice=prompt(`Reset used status for which period?\n\n1 = Monthly credits\n2 = Quarterly credits\n3 = Semi-annual credits\n4 = Annual credits\n5 = ALL benefits\n\nEnter a number (1-5):`);
  const idx=parseInt(choice)-1;
  if(isNaN(idx)||idx<0||idx>4)return;
  const period=opts[idx];
  const label=labels[idx];
  if(!confirm(`Reset all "${label}" checkmarks to unused?\n\nThis cannot be undone.`))return;
  cards.forEach(c=>c.benefits.forEach(b=>{
    if(period==='all'||b.p===period)b.used=false;
  }));
  saveState();
  render();
  const t=document.getElementById('save-toast');
  t.textContent=`✓ ${label} reset`;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.classList.remove('show');t.textContent='✓ Saved';},2000);
}

// Init
const now=new Date();
const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
const q=Math.ceil((now.getMonth()+1)/3);
document.getElementById('hdr-sub').textContent=`${months[now.getMonth()]} ${now.getFullYear()} · Q${q} · Changes saved to this browser`;
loadState();
render();
</script>
